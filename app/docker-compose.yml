
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # Mount source code for live reload in development
    #volumes:
    # - ./backend:/app/
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped